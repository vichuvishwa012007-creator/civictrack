services:
  - type: web
    name: civictrack-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@civictrack.gov.in
      - key: ADMIN_PASSWORD
        value: Admin@1234
      - key: FRONTEND_URL
        value: https://civictrack.netlify.app
